<svg viewBox="0 0 340 150" fill="none" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="none" role="img" aria-label="Candlestick">
  <defs>
    <linearGradient id="cdUp" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#B388FF"/>
      <stop offset="100%" stop-color="#7C3AED"/>
    </linearGradient>
    <filter id="cdGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="1.6" result="b"/>
      <feFlood flood-color="#7C3AED" flood-opacity="0.7"/>
      <feComposite in2="b" operator="in" result="g"/>
      <feMerge><feMergeNode in="g"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- grade -->
  <g stroke="#FFFFFF" stroke-width="0.6" opacity="0.07">
    <line x1="0" y1="36" x2="340" y2="36"/>
    <line x1="0" y1="76" x2="340" y2="76"/>
    <line x1="0" y1="116" x2="340" y2="116"/>
  </g>

  <!-- pavios -->
  <g stroke="#C9A1FF" stroke-width="1.1" opacity="0.85">
    <line x1="12" y1="92" x2="12" y2="126"/><line x1="29" y1="86" x2="29" y2="118"/>
    <line x1="46" y1="92" x2="46" y2="124"/><line x1="63" y1="78" x2="63" y2="112"/>
    <line x1="80" y1="84" x2="80" y2="116"/><line x1="97" y1="70" x2="97" y2="104"/>
    <line x1="114" y1="76" x2="114" y2="108"/><line x1="131" y1="62" x2="131" y2="96"/>
    <line x1="148" y1="70" x2="148" y2="100"/><line x1="165" y1="56" x2="165" y2="90"/>
    <line x1="182" y1="64" x2="182" y2="94"/><line x1="199" y1="50" x2="199" y2="84"/>
    <line x1="216" y1="58" x2="216" y2="88"/><line x1="233" y1="44" x2="233" y2="76"/>
    <line x1="250" y1="52" x2="250" y2="80"/><line x1="267" y1="36" x2="267" y2="68"/>
    <line x1="284" y1="42" x2="284" y2="72"/><line x1="301" y1="24" x2="301" y2="58"/>
    <line x1="318" y1="14" x2="318" y2="50"/>
  </g>

  <!-- corpos -->
  <g filter="url(#cdGlow)">
    <rect x="9" y="98" width="6" height="22" fill="#5B21B6"/>
    <rect x="26" y="90" width="6" height="22" fill="url(#cdUp)"/>
    <rect x="43" y="96" width="6" height="22" fill="#5B21B6"/>
    <rect x="60" y="82" width="6" height="24" fill="url(#cdUp)"/>
    <rect x="77" y="88" width="6" height="22" fill="#5B21B6"/>
    <rect x="94" y="74" width="6" height="24" fill="url(#cdUp)"/>
    <rect x="111" y="80" width="6" height="22" fill="#5B21B6"/>
    <rect x="128" y="66" width="6" height="24" fill="url(#cdUp)"/>
    <rect x="145" y="74" width="6" height="20" fill="#5B21B6"/>
    <rect x="162" y="60" width="6" height="24" fill="url(#cdUp)"/>
    <rect x="179" y="68" width="6" height="20" fill="#5B21B6"/>
    <rect x="196" y="54" width="6" height="24" fill="url(#cdUp)"/>
    <rect x="213" y="62" width="6" height="20" fill="#5B21B6"/>
    <rect x="230" y="48" width="6" height="22" fill="url(#cdUp)"/>
    <rect x="247" y="56" width="6" height="18" fill="#5B21B6"/>
    <rect x="264" y="40" width="6" height="22" fill="url(#cdUp)"/>
    <rect x="281" y="46" width="6" height="20" fill="#5B21B6"/>
    <rect x="298" y="28" width="6" height="24" fill="url(#cdUp)"/>
    <rect x="315" y="18" width="6" height="26" fill="url(#cdUp)"/>
  </g>

  <!-- linha de tendência -->
  <path d="M4 114 C 60 110 96 92 140 86 S 240 58 336 20"
        stroke="#E9DCFF" stroke-width="1.4" opacity="0.55" filter="url(#cdGlow)"/>
</svg>
