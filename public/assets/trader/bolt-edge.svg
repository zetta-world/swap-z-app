<svg viewBox="0 0 160 700" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Raio lateral">
  <defs>
    <filter id="beAura" x="-80%" y="-10%" width="260%" height="120%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="5" result="b1"/>
      <feFlood flood-color="#7C3AED" flood-opacity="0.7"/>
      <feComposite in2="b1" operator="in" result="g1"/>
      <feGaussianBlur in="SourceGraphic" stdDeviation="1.4" result="b2"/>
      <feFlood flood-color="#C9A1FF" flood-opacity="0.9"/>
      <feComposite in2="b2" operator="in" result="g2"/>
      <feMerge><feMergeNode in="g1"/><feMergeNode in="g2"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <g filter="url(#beAura)" opacity="0.25">
    <path d="M70 0 L52 130 L84 168 L40 330 L76 366 L34 540 L60 568 L30 690"
          stroke="#CBB1FF" stroke-width="3" fill="none"/>
  </g>

  <!-- flash duplo (dois strikes por ciclo de 9s) -->
  <g filter="url(#beAura)">
    <animate attributeName="opacity" dur="9s" repeatCount="indefinite"
      values="0;0;0.9;0.2;0.7;0;0;0;1;0.3;0;0"
      keyTimes="0;0.30;0.33;0.36;0.39;0.44;0.62;0.80;0.83;0.86;0.90;1"/>
    <path d="M70 0 L52 130 L84 168 L40 330 L76 366 L34 540 L60 568 L30 690"
          stroke="#FFFFFF" stroke-width="3.4" fill="none"/>
    <path d="M52 130 L18 196 L30 206 L8 252" stroke="#E9D8FF" stroke-width="1.8" fill="none" opacity="0.9"/>
    <path d="M76 366 L116 432 L104 442 L132 496" stroke="#E9D8FF" stroke-width="1.8" fill="none" opacity="0.9"/>
  </g>
</svg>
