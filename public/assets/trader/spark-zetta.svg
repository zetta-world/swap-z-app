<svg viewBox="0 0 280 90" fill="none" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="none" role="img" aria-label="Sparkline ZETTA">
  <defs>
    <linearGradient id="szArea" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#8B5CF6" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#8B5CF6" stop-opacity="0"/>
    </linearGradient>
    <filter id="szGlow" x="-10%" y="-40%" width="120%" height="180%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="2.2" result="b"/>
      <feFlood flood-color="#7C3AED" flood-opacity="0.8"/>
      <feComposite in2="b" operator="in" result="g"/>
      <feMerge><feMergeNode in="g"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <path d="M0 70 L20 64 L38 68 L56 58 L74 62 L92 50 L110 55 L128 44 L146 49 L164 38 L182 44 L200 30 L218 36 L236 22 L254 27 L272 14 L280 16 L280 90 L0 90 Z"
        fill="url(#szArea)"/>
  <path d="M0 70 L20 64 L38 68 L56 58 L74 62 L92 50 L110 55 L128 44 L146 49 L164 38 L182 44 L200 30 L218 36 L236 22 L254 27 L272 14 L280 16"
        stroke="#B388FF" stroke-width="2.2" stroke-linejoin="round" filter="url(#szGlow)"/>
  <circle cx="280" cy="16" r="3.5" fill="#E9DCFF" filter="url(#szGlow)">
    <animate attributeName="r" values="3;5;3" dur="2.4s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="1;0.6;1" dur="2.4s" repeatCount="indefinite"/>
  </circle>
</svg>
