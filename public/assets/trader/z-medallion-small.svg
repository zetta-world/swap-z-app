<svg viewBox="0 0 44 44" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Z-SWAP Trader">
  <defs>
    <linearGradient id="zsRing" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#F8E98E"/>
      <stop offset="60%" stop-color="#C9A227"/>
      <stop offset="100%" stop-color="#8A6D1A"/>
    </linearGradient>
    <linearGradient id="zsZ" gradientUnits="userSpaceOnUse" x1="22" y1="9" x2="22" y2="35">
      <stop offset="0%" stop-color="#FBF3B9"/>
      <stop offset="55%" stop-color="#D9B83A"/>
      <stop offset="100%" stop-color="#8A6D1A"/>
    </linearGradient>
    <linearGradient id="zsGem" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#C9A1FF"/>
      <stop offset="100%" stop-color="#7C3AED"/>
