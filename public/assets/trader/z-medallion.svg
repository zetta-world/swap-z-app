<svg viewBox="0 0 240 240" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Z-SWAP Trader Medallion">
  <defs>
    <linearGradient id="zmRing" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#F8E98E"/>
      <stop offset="55%" stop-color="#C9A227"/>
      <stop offset="100%" stop-color="#8A6D1A"/>
    </linearGradient>
    <linearGradient id="zmZ" gradientUnits="userSpaceOnUse" x1="120" y1="56" x2="120" y2="186">
      <stop offset="0%" stop-color="#FBF3B9"/>
      <stop offset="42%" stop-color="#E2C04B"/>
      <stop offset="72%" stop-color="#C9A227"/>
      <stop offset="100%" stop-color="#8A6D1A"/>
    </linearGradient>
    <linearGradient id="zmGem" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#C9A1FF"/>
      <stop offset="100%" stop-color="#7C3AED"/>
    </linearGradient>
    <radialGradient id="zmSheen" cx="36%" cy="28%" r="75%">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.32"/>
      <stop offset="45%" stop-color="#FFFFFF" stop-opacity="0.06"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0"/>
    </radialGradient>
    <filter id="zmGlow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="4.5" result="bV"/>
      <feFlood flood-color="#7C3AED" flood-opacity="0.38"/>
      <feComposite in2="bV" operator="in" result="gV"/>
      <feGaussianBlur in="SourceGraphic" stdDeviation="1.6" result="bG"/>
      <feFlood flood-color="#F8E98E" flood-opacity="0.6"/>
      <feComposite in2="bG" operator="in" result="gG"/>
      <feMerge>
        <feMergeNode in="gV"/><feMergeNode in="gG"/><feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="zmGemGlow" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="2.4" result="b"/>
      <feFlood flood-color="#8B5CF6" flood-opacity="0.85"/>
      <feComposite in2="b" operator="in" result="g"/>
      <feMerge><feMergeNode in="g"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- anel externo duplo -->
  <circle cx="120" cy="120" r="108" stroke="url(#zmRing)" stroke-width="3"/>
  <circle cx="120" cy="120" r="103.5" stroke="url(#zmRing)" stroke-width="0.8" opacity="0.5"/>

  <!-- anel perolado: 96 contas via dasharray (C=2πr≈609.5 → 96×6.35) -->
  <circle cx="120" cy="120" r="97" stroke="url(#zmRing)" stroke-width="2.4"
          stroke-dasharray="1.75 4.6" stroke-linecap="round" opacity="0.9"/>

  <!-- anel interno fino -->
  <circle cx="120" cy="120" r="89" stroke="url(#zmRing)" stroke-width="1" opacity="0.55"/>

  <!-- estações L/O: diamante duplo + ponto -->
  <g fill="url(#zmRing)">
    <path d="M232 120 L237 125 L232 130 L227 125 Z" transform="translate(0 -5)"/>
    <circle cx="219" cy="120" r="1.8"/>
    <path d="M8 120 L13 125 L8 130 L3 125 Z" transform="translate(0 -5)"/>
    <circle cx="21" cy="120" r="1.8"/>
  </g>

  <!-- estações diagonais: tick + ponto -->
  <g stroke="url(#zmRing)" stroke-width="2.4" stroke-linecap="round">
    <line x1="196.6" y1="43.4" x2="202.3" y2="37.7"/>
    <line x1="196.6" y1="196.6" x2="202.3" y2="202.3"/>
    <line x1="43.4" y1="196.6" x2="37.7" y2="202.3"/>
    <line x1="43.4" y1="43.4" x2="37.7" y2="37.7"/>
  </g>
  <g fill="url(#zmRing)">
    <circle cx="189.5" cy="50.5" r="1.6"/>
    <circle cx="189.5" cy="189.5" r="1.6"/>
    <circle cx="50.5" cy="189.5" r="1.6"/>
    <circle cx="50.5" cy="50.5" r="1.6"/>
  </g>

  <!-- gemas facetadas N e S -->
  <g filter="url(#zmGemGlow)">
    <path d="M120 1 L131 14 L120 27 L109 14 Z" fill="url(#zmGem)"/>
    <path d="M120 1 L131 14 H109 Z" fill="#D9C2FF" opacity="0.55"/>
    <path d="M120 5 V23 M113 14 H127" stroke="#E9DCFF" stroke-width="1" opacity="0.8"/>
    <path d="M120 213 L131 226 L120 239 L109 226 Z" fill="url(#zmGem)"/>
    <path d="M120 213 L131 226 H109 Z" fill="#D9C2FF" opacity="0.55"/>
    <path d="M120 217 V235 M113 226 H127" stroke="#E9DCFF" stroke-width="1" opacity="0.8"/>
  </g>

  <!-- Z trajano: barras + diagonal + 8 serifas flamejadas -->
  <g filter="url(#zmGlow)">
    <g fill="url(#zmZ)" stroke="#6B520F" stroke-width="1">
      <rect x="72" y="66" width="96" height="12"/>
      <rect x="72" y="162" width="96" height="12"/>
      <path d="M168 78 L138 78 L72 162 L102 162 Z"/>
      <path d="M72 66 L62 59 L79 63 Z"/>
      <path d="M72 78 L62 85 L79 81 Z"/>
      <path d="M168 66 L178 59 L161 63 Z"/>
      <path d="M168 78 L178 85 L161 81 Z"/>
      <path d="M72 162 L62 155 L79 159 Z"/>
      <path d="M72 174 L62 181 L79 177 Z"/>
      <path d="M168 162 L178 155 L161 159 Z"/>
      <path d="M168 174 L178 181 L161 177 Z"/>
    </g>
    <!-- highlights metálicos -->
    <path d="M76 68.5 H164" stroke="#FFF7CF" stroke-width="1.5" opacity="0.7" stroke-linecap="round"/>
    <path d="M137 80 L75 159" stroke="#FFF7CF" stroke-width="1.3" opacity="0.45" stroke-linecap="round"/>
    <path d="M76 164.5 H120" stroke="#FFF7CF" stroke-width="1.2" opacity="0.4" stroke-linecap="round"/>
    <!-- gema central facetada -->
    <g filter="url(#zmGemGlow)">
      <path d="M120 108 L130 120 L120 132 L110 120 Z" fill="url(#zmGem)"/>
      <path d="M120 108 L130 120 H110 Z" fill="#D9C2FF" opacity="0.5"/>
      <path d="M120 111 V129" stroke="#E9DCFF" stroke-width="1" opacity="0.85"/>
    </g>
  </g>

  <!-- sheen metálico (luz do alto-esquerdo) -->
  <circle cx="120" cy="120" r="107" fill="url(#zmSheen)" opacity="0.55" pointer-events="none"/>
</svg>
