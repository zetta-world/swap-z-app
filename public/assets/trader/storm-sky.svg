<svg viewBox="0 0 1200 600" preserveAspectRatio="xMidYMid slice" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Céu de tempestade">
  <defs>
    <!-- nébula larga (frequência baixa) -->
    <filter id="ssNebula" x="0" y="0" width="100%" height="100%">
      <feTurbulence type="fractalNoise" baseFrequency="0.0028 0.0046" numOctaves="3" seed="4"/>
      <feColorMatrix type="matrix"
        values="0 0 0 0 0.42
                0 0 0 0 0.20
                0 0 0 0 0.72
                0.7 0.7 0.7 0 -0.34"/>
    </filter>
    <!-- nuvens densas (frequência alta) -->
    <filter id="ssClouds" x="0" y="0" width="100%" height="100%">
      <feTurbulence type="fractalNoise" baseFrequency="0.009 0.015" numOctaves="5" seed="11"/>
      <feColorMatrix type="matrix"
        values="0 0 0 0 0.30
                0 0 0 0 0.15
                0 0 0 0 0.55
                0.55 0.55 0.55 0 -0.20"/>
      <feGaussianBlur stdDeviation="0.5"/>
    </filter>
    <radialGradient id="ssGlow" cx="50%" cy="6%" r="80%">
      <stop offset="0%" stop-color="#8B5CF6" stop-opacity="0.55"/>
      <stop offset="32%" stop-color="#5B21B6" stop-opacity="0.30"/>
      <stop offset="100%" stop-color="#0B0B12" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="ssFloor" x1="0" y1="0" x2="0" y2="1">
      <stop offset="55%" stop-color="#0B0B12" stop-opacity="0"/>
      <stop offset="100%" stop-color="#0B0B12" stop-opacity="0.92"/>
    </linearGradient>
    <linearGradient id="ssTop" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#05030C" stop-opacity="0.85"/>
      <stop offset="22%" stop-color="#05030C" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="600" fill="#0E0A1C"/>
  <rect width="1200" height="600" filter="url(#ssNebula)" opacity="0.85"/>
  <rect width="1200" height="600" filter="url(#ssClouds)" opacity="0.9"/>
  <rect width="1200" height="600" fill="url(#ssGlow)"/>
  <rect width="1200" height="600" fill="url(#ssTop)"/>
  <rect width="1200" height="600" fill="url(#ssFloor)"/>
</svg>
