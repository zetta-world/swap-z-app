<svg viewBox="0 0 120 120" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Moldura NFT">
  <defs>
    <linearGradient id="nfGold" gradientUnits="userSpaceOnUse" x1="60" y1="0" x2="60" y2="120">
      <stop offset="0%" stop-color="#F8E98E"/>
      <stop offset="50%" stop-color="#C9A227"/>
      <stop offset="100%" stop-color="#8A6D1A"/>
    </linearGradient>
    <linearGradient id="nfGem" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#C9A1FF"/>
      <stop offset="100%" stop-color="#7C3AED"/>
    </linearGradient>
    <filter id="nfGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="0.9" result="b"/>
      <feFlood flood-color="#F8E98E" flood-opacity="0.4"/>
      <feComposite in2="b" operator="in" result="g"/>
      <feMerge><feMergeNode in="g"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- cantos: tripla linha + gema violeta -->
  <g filter="url(#nfGlow)">
    <g>
      <path d="M3 36 V11 L11 3 H36" stroke="url(#nfGold)" stroke-width="2.6"/>
      <path d="M8 33 V14 L14 8 H33" stroke="url(#nfGold)" stroke-width="1.2" opacity="0.8"/>
      <path d="M13 30 V17 L17 13 H30" stroke="url(#nfGold)" stroke-width="0.7" opacity="0.5"/>
      <path d="M11 6.5 L15.5 11 L11 15.5 L6.5 11 Z" fill="url(#nfGem)"/>
    </g>
    <g transform="translate(120 0) scale(-1 1)">
      <path d="M3 36 V11 L11 3 H36" stroke="url(#nfGold)" stroke-width="2.6"/>
      <path d="M8 33 V14 L14 8 H33" stroke="url(#nfGold)" stroke-width="1.2" opacity="0.8"/>
      <path d="M13 30 V17 L17 13 H30" stroke="url(#nfGold)" stroke-width="0.7" opacity="0.5"/>
      <path d="M11 6.5 L15.5 11 L11 15.5 L6.5 11 Z" fill="url(#nfGem)"/>
    </g>
    <g transform="translate(0 120) scale(1 -1)">
      <path d="M3 36 V11 L11 3 H36" stroke="url(#nfGold)" stroke-width="2.6"/>
      <path d="M8 33 V14 L14 8 H33" stroke="url(#nfGold)" stroke-width="1.2" opacity="0.8"/>
      <path d="M13 30 V17 L17 13 H30" stroke="url(#nfGold)" stroke-width="0.7" opacity="0.5"/>
      <path d="M11 6.5 L15.5 11 L11 15.5 L6.5 11 Z" fill="url(#nfGem)"/>
    </g>
    <g transform="translate(120 120) scale(-1 -1)">
      <path d="M3 36 V11 L11 3 H36" stroke="url(#nfGold)" stroke-width="2.6"/>
      <path d="M8 33 V14 L14 8 H33" stroke="url(#nfGold)" stroke-width="1.2" opacity="0.8"/>
      <path d="M13 30 V17 L17 13 H30" stroke="url(#nfGold)" stroke-width="0.7" opacity="0.5"/>
      <path d="M11 6.5 L15.5 11 L11 15.5 L6.5 11 Z" fill="url(#nfGem)"/>
    </g>
  </g>

  <!-- arestas: linha dupla contínua -->
  <g stroke="url(#nfGold)">
    <line x1="36" y1="3.5" x2="84" y2="3.5" stroke-width="1.8"/>
    <line x1="36" y1="8.5" x2="84" y2="8.5" stroke-width="0.8" opacity="0.6"/>
    <line x1="36" y1="116.5" x2="84" y2="116.5" stroke-width="1.8"/>
    <line x1="36" y1="111.5" x2="84" y2="111.5" stroke-width="0.8" opacity="0.6"/>
    <line x1="3.5" y1="36" x2="3.5" y2="84" stroke-width="1.8"/>
    <line x1="8.5" y1="36" x2="8.5" y2="84" stroke-width="0.8" opacity="0.6"/>
    <line x1="116.5" y1="36" x2="116.5" y2="84" stroke-width="1.8"/>
    <line x1="111.5" y1="36" x2="111.5" y2="84" stroke-width="0.8" opacity="0.6"/>
  </g>
</svg>
