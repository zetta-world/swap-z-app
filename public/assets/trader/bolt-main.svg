<svg viewBox="0 0 400 700" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Raio de Thor">
  <defs>
    <filter id="bmAura" x="-60%" y="-10%" width="220%" height="125%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="8" result="b1"/>
      <feFlood flood-color="#7C3AED" flood-opacity="0.75"/>
      <feComposite in2="b1" operator="in" result="g1"/>
      <feGaussianBlur in="SourceGraphic" stdDeviation="2.2" result="b2"/>
      <feFlood flood-color="#C9A1FF" flood-opacity="0.95"/>
      <feComposite in2="b2" operator="in" result="g2"/>
      <feMerge><feMergeNode in="g1"/><feMergeNode in="g2"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <radialGradient id="bmImpact" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.95"/>
      <stop offset="35%" stop-color="#C9A1FF" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#7C3AED" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- brilho residual permanente -->
  <g filter="url(#bmAura)" opacity="0.3">
    <path d="M212 0 L186 110 L224 142 L168 296 L210 330 L148 500 L182 528 L150 656"
          stroke="#CBB1FF" stroke-width="4" stroke-linejoin="miter" fill="none"/>
  </g>

  <!-- STRIKE: corpo afunilado + ramos + impacto, flash periódico -->
  <g>
    <animate attributeName="opacity" dur="6.5s" repeatCount="indefinite"
      values="0;0;1;0.3;1;0.15;0;0"
      keyTimes="0;0.72;0.75;0.78;0.81;0.86;0.9;1"/>

    <!-- corpo poligonal: grosso no céu (≈18) → fino no impacto (≈3) -->
    <g filter="url(#bmAura)">
      <path fill="#FFFFFF" d="
        M204 0 L222 0
        L198 108 L234 142 L180 298 L219 332 L160 504 L189 530 L152 656
        L148 656 L176 526 L146 498 L202 330 L164 294 L220 140 L186 106 Z"/>
      <path fill="#E9D8FF" opacity="0.95" d="M186 106 L122 188 L139 203 L94 268 L90 265 L132 200 L116 186 Z"/>
      <path fill="#E9D8FF" opacity="0.95" d="M202 330 L284 418 L268 433 L318 506 L313 503 L262 432 L276 418 Z"/>
      <path fill="#E9D8FF" opacity="0.85" d="M164 294 L134 348 L130 346 L160 292 Z"/>
      <path fill="#E9D8FF" opacity="0.85" d="M220 140 L260 186 L256 189 L216 144 Z"/>
    </g>

    <!-- flash de impacto no solo -->
    <ellipse cx="152" cy="652" rx="70" ry="16" fill="url(#bmImpact)"/>
    <ellipse cx="152" cy="652" rx="26" ry="6" fill="#FFFFFF" opacity="0.9"/>
  </g>
</svg>
