name: CI

# Every push and PR runs lint + type-check + unit tests. This is the safety
# net the repo never had: the money-math (parsePrice / extractSuggestion /
# resolveOne / estimateCost) is covered by unit tests, and a regression in any
# of them now fails the build instead of silently corrupting the flywheel.
on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  checks:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Lint
        run: npm run lint
      - name: Type-check
        run: npm run type-check
      - name: Unit tests
        run: npm test
      # Advisory scan — WARNS (doesn't block) so a new upstream advisory with
      # no fix released yet can't freeze deploys; the step turns yellow and
      # the operator triages. Dependabot opens the fix PR when one exists.
      - name: npm audit (high+)
        run: npm audit --audit-level=high
        continue-on-error: true
